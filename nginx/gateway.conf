resolver 127.0.0.11 valid=10s ipv6=off;

map $http_upgrade $connection_upgrade {
  default upgrade;
  ''      close;
}

# Кеш-политика для assets с хешом в имени (Vite — index-XXX.js, foo-YYY.css)
# vs index.html — должны кешироваться по-разному.
map $sent_http_content_type $cache_long {
  default                   '';
  ~*application/javascript  'public, max-age=31536000, immutable';
  ~*text/css                'public, max-age=31536000, immutable';
  ~*image/                  'public, max-age=31536000, immutable';
  ~*font/                   'public, max-age=31536000, immutable';
  ~*application/font        'public, max-age=31536000, immutable';
}

gzip on;
gzip_vary on;
gzip_comp_level 6;
gzip_min_length 1024;
gzip_proxied any;
gzip_types
  text/plain
  text/css
  text/xml
  application/json
  application/javascript
  application/xml
  application/xml+rss
  application/wasm
  font/woff
  font/woff2
  image/svg+xml;

server {
  listen 80;
  client_max_body_size 20m;

  # Security headers — применяются ко всем ответам.
  add_header X-Content-Type-Options "nosniff" always;
  add_header X-Frame-Options "SAMEORIGIN" always;
  add_header Referrer-Policy "strict-origin-when-cross-origin" always;
  add_header Permissions-Policy "geolocation=(), camera=(), microphone=()" always;

  error_page 502 503 504 /__error.html;
  location = /__error.html {
    internal;
    default_type text/html;
    add_header Cache-Control "no-store" always;
    return 503 '<!doctype html><meta charset="utf-8"><title>Сервис недоступен</title><style>body{font-family:system-ui;padding:48px;max-width:560px;margin:auto;color:#222}h1{margin-top:0}</style><h1>Сервис временно недоступен</h1><p>Backend не отвечает. Попробуйте обновить страницу через минуту.</p>';
  }

  location /api/health {
    proxy_pass http://backend:3000/api/v1/health;
    proxy_http_version 1.1;
    proxy_connect_timeout 3s;
    proxy_send_timeout 5s;
    proxy_read_timeout 5s;
    proxy_set_header Host $host;
    add_header Cache-Control "no-store" always;
  }

  location /api/v1/evaluate {
    proxy_pass http://backend:3000/api/v1/evaluate;
    proxy_http_version 1.1;
    proxy_connect_timeout 5s;
    proxy_send_timeout 15s;
    proxy_read_timeout 15s;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    add_header Cache-Control "no-store" always;
  }

  location /api/ {
    proxy_pass http://backend:3000/api/;
    proxy_http_version 1.1;
    proxy_connect_timeout 5s;
    proxy_send_timeout 30s;
    proxy_read_timeout 30s;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    add_header Cache-Control "no-store" always;
  }

  location /grafana/ {
    set $grafana_upstream grafana:3000;
    proxy_pass http://$grafana_upstream$request_uri;
    proxy_http_version 1.1;
    proxy_connect_timeout 5s;
    proxy_send_timeout 60s;
    proxy_read_timeout 60s;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection $connection_upgrade;
  }

  # SPA: index.html не кешируем (нужен ETag для обновлений), статические
  # assets с хешом в имени — навсегда.
  location = / {
    proxy_pass http://frontend:8080/;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    add_header Cache-Control "no-cache, no-store, must-revalidate" always;
    add_header X-Content-Type-Options "nosniff" always;
  }

  location = /index.html {
    proxy_pass http://frontend:8080/index.html;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    add_header Cache-Control "no-cache, no-store, must-revalidate" always;
  }

  location / {
    proxy_pass http://frontend:8080;
    proxy_http_version 1.1;
    proxy_connect_timeout 5s;
    proxy_send_timeout 15s;
    proxy_read_timeout 15s;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    add_header Cache-Control $cache_long;
  }
}
