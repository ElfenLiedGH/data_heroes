groups:
  - name: backend.slo
    interval: 30s
    rules:
      # Доля ответов 5xx за 5 минут > 1%
      - alert: BackendHigh5xxRate
        expr: |
          (
            sum(rate(http_server_request_duration_seconds_count{http_response_status_code=~"5.."}[5m]))
            /
            sum(rate(http_server_request_duration_seconds_count[5m]))
          ) > 0.01
        for: 5m
        labels:
          severity: warning
          service: notification-preferences-backend
        annotations:
          summary: "Backend 5xx error rate is above 1%"
          description: "5xx rate за 5 минут — {{ printf \"%.2f\" $value }}%. Проверьте логи backend."

      # p95 latency на /api/v1/* поверх 1s
      - alert: BackendHighLatencyP95
        expr: |
          histogram_quantile(
            0.95,
            sum by (le) (rate(http_server_request_duration_seconds_bucket[5m]))
          ) > 1
        for: 10m
        labels:
          severity: warning
          service: notification-preferences-backend
        annotations:
          summary: "Backend p95 latency > 1s"
          description: "p95 = {{ printf \"%.2fs\" $value }}. Проверьте medical БД или внешние зависимости."

      # Backend перезапускается чаще 3 раз за 15 минут (proxy через postgres_exporter
      # недоступен — это OTEL метрика которая может не быть; держим заглушку, но
      # этот алерт можно адаптировать под container restart metric, если он есть).
      - alert: BackendUp
        expr: up{job="otel-collector"} == 0
        for: 2m
        labels:
          severity: critical
          service: otel-collector
        annotations:
          summary: "OTEL collector недоступен"
          description: "Prometheus не может скрейпить otel-collector. Backend перестал слать телеметрию."

  - name: database.health
    interval: 30s
    rules:
      - alert: PostgresExporterDown
        expr: up{job="postgres"} == 0
        for: 2m
        labels:
          severity: critical
          service: postgres
        annotations:
          summary: "postgres_exporter не отвечает Prometheus"
          description: "Метрики БД не собираются. Возможно, postgres_exporter или сама БД упали."

      - alert: PostgresTooManyConnections
        expr: pg_stat_activity_count > 80
        for: 5m
        labels:
          severity: warning
          service: postgres
        annotations:
          summary: "Postgres: > 80 активных подключений"
          description: "{{ $value }} активных подключений к БД. Возможно, утечка пула в backend."

      - alert: PostgresReplicationDown
        expr: pg_up == 0
        for: 1m
        labels:
          severity: critical
          service: postgres
        annotations:
          summary: "Postgres недоступен для postgres_exporter"
          description: "pg_up=0 у postgres_exporter — БД не отвечает на подключения."

  - name: host.resources
    interval: 30s
    rules:
      # Эти алерты требуют node_exporter (сейчас не установлен) — оставлены
      # для будущего: добавь node_exporter в compose и они начнут работать.
      - alert: HostHighMemoryUsage
        expr: |
          (1 - (node_memory_MemAvailable_bytes / node_memory_MemTotal_bytes)) > 0.9
        for: 10m
        labels:
          severity: warning
          service: host
        annotations:
          summary: "Хост использует > 90% RAM"
          description: "Возможен скорый OOM — проверь docker stats и mem_limits."
